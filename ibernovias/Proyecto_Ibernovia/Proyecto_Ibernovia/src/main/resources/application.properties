spring.application.name=Proyecto_Ibernovia
server.port=${SERVER_PORT:8080}

# CORS (separado por comas). Ej: https://ibernovia.es,https://www.ibernovia.es
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:3000}

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/ibernovia?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:toor}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${APP_JWT_SECRET:IBERNOVIA_SUPER_SECRET_KEY_CHANGE_IN_PRODUCTION_2026_64_CHAR_MINIMUM_KEY}

# Email Configuration (SMTP)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:tu-email@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:tu-app-password}
spring.mail.properties.mail.smtp.auth=true

# STARTTLS (587) vs SSL (465)
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.ssl.enable=${SPRING_MAIL_SMTP_SSL_ENABLE:false}
# Si tu servidor usa cert no estándar, puedes confiar explícitamente en el host:
spring.mail.properties.mail.smtp.ssl.trust=${SPRING_MAIL_SMTP_SSL_TRUST:}
# Verificación de nombre de host (SAN). Déjalo en true; ponlo en false SOLO para pruebas locales si tu cert no cuadra.
spring.mail.properties.mail.smtp.ssl.checkserveridentity=${SPRING_MAIL_SMTP_SSL_CHECKSERVERIDENTITY:true}

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Contact Email
contact.mail.to=${CONTACT_MAIL_TO:info@ibernovia.es}
contact.mail.from=${SPRING_MAIL_USERNAME:no-reply@ibernovia.es}

# Admin Setup
app.admin.setup-key=${APP_ADMIN_SETUP_KEY:ibernovia-setup-2026}

# Firebase
app.firebase.project-id=${VITE_FIREBASE_PROJECT_ID:ibernovia}

# Business guest access codes (separated by commas)
app.business.codes=${APP_BUSINESS_CODES:EMPRESA2025,IBERNOVIA2025,DEMO123}

# Gemini AI Key
app.gemini.api-key=${GEMINI_API_KEY:}