# 1. La URL sigue igual (asegúrate de que la DB 'ibernovia' esté creada en MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/ibernovia?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# 2. El Driver (esto está bien)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. ˇELIMINA O COMENTA ESTA LÍNEA! 
